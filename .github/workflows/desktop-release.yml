name: Desktop Release Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-release:
    name: macOS ${{ matrix.label }} release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Apple Silicon arm64
            runner: macos-14
            expected_arch: arm64
            artifact_name: CadillacPackager-macos-arm64
            zip_name: CadillacPackager-macos-arm64.zip
          - label: Intel x86_64
            runner: macos-15-intel
            expected_arch: x86_64
            artifact_name: CadillacPackager-macos-x64
            zip_name: CadillacPackager-macos-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.22.3'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build macOS app
        run: flutter build macos --release

      - name: Verify macOS architecture
        run: |
          shopt -s nullglob
          APPS=(build/macos/Build/Products/Release/*.app)
          if [ "${#APPS[@]}" -ne 1 ]; then
            echo "Expected one built .app, found ${#APPS[@]}"
            printf '%s\n' "${APPS[@]}"
            exit 1
          fi
          APP_PATH="${APPS[0]}"
          BINARIES=("$APP_PATH"/Contents/MacOS/*)
          if [ "${#BINARIES[@]}" -lt 1 ]; then
            echo "No executable found in $APP_PATH/Contents/MacOS"
            exit 1
          fi
          APP_BINARY="${BINARIES[0]}"
          ARCH_INFO="$(lipo -info "$APP_BINARY")"
          echo "$ARCH_INFO"
          echo "$ARCH_INFO" | grep "${{ matrix.expected_arch }}"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Zip macOS app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "${{ matrix.zip_name }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.zip_name }}

  windows-release:
    name: Windows x64 release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.22.3'
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build Windows app
        run: flutter build windows --release

      - name: Package Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build\windows\x64\runner\Release\* `
            -DestinationPath dist\CadillacPackager-windows-x64.zip `
            -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CadillacPackager-windows-x64
          path: dist/CadillacPackager-windows-x64.zip
