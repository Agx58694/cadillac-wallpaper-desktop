name: Desktop Release Artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  macos-release:
    name: macOS Universal release
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.22.3'
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build macOS app
        run: flutter build macos --release

      - name: Verify macOS architecture
        run: |
          shopt -s nullglob
          APPS=(build/macos/Build/Products/Release/*.app)
          if [ "${#APPS[@]}" -ne 1 ]; then
            echo "Expected one built .app, found ${#APPS[@]}"
            printf '%s\n' "${APPS[@]}"
            exit 1
          fi
          APP_PATH="${APPS[0]}"
          BINARIES=("$APP_PATH"/Contents/MacOS/*)
          if [ "${#BINARIES[@]}" -lt 1 ]; then
            echo "No executable found in $APP_PATH/Contents/MacOS"
            exit 1
          fi
          APP_BINARY="${BINARIES[0]}"
          ARCH_INFO="$(lipo -info "$APP_BINARY")"
          echo "$ARCH_INFO"
          echo "$ARCH_INFO" | grep "x86_64"
          echo "$ARCH_INFO" | grep "arm64"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Zip macOS app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            CadillacPackager-macos-universal.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: CadillacPackager-macos-universal
          path: CadillacPackager-macos-universal.zip
